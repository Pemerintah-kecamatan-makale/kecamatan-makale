<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survei Kepuasan Masyarakat | Kecamatan Makale</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-gray-100 flex flex-col min-h-screen">

    <!-- Header Website -->
    <div id="header-placeholder"></div>

    <!-- HERO -->
    <section class="relative bg-cover bg-center h-72"
        style="background-image:url('assets/images/Plaza Kolam Makale.jpg')">

        <div class="absolute inset-0 bg-black/60"></div>

        <div class="relative z-10 flex flex-col justify-center items-center h-full text-center text-white px-4">

            <h1 class="text-4xl font-extrabold">
                SURVEI KEPUASAN MASYARAKAT
            </h1>

            <p class="mt-3 max-w-2xl text-gray-200">
                Pendapat Anda sangat berarti bagi kami untuk meningkatkan kualitas pelayanan publik
                di Kecamatan Makale.
            </p>

        </div>

    </section>

    <!-- FORM -->
    <main class="max-w-5xl mx-auto w-full px-4 py-10">

        <div class="bg-white rounded-xl shadow-lg p-8">

            <h2 class="text-2xl font-bold text-red-800 mb-6 border-b pb-3">
                Identitas Responden
            </h2>
<div id="notif"
     class="hidden mb-6 rounded-lg border border-green-300 bg-green-50 p-4 text-green-800 shadow">

    <div class="flex items-center">

        <i class="fas fa-circle-check text-2xl mr-3"></i>

        <div>

            <h3 class="font-bold">
                Terima kasih
            </h3>

            <p id="notifText">
                Survei berhasil dikirim.
            </p>

        </div>

    </div>

</div>
            <form id="formSKM">

                <div class="grid md:grid-cols-2 gap-5">

                    <div>
                        <label class="font-semibold">
                            Nama (Opsional)
                        </label>

                        <input
                            type="text"
                            id="nama"
                            class="w-full mt-2 border rounded-lg p-3">
                    </div>

                    <div>

                        <label class="font-semibold">
                            Umur
                        </label>

                        <input
                            type="number"
                            id="umur"
                            class="w-full mt-2 border rounded-lg p-3">

                    </div>

                    <div>

                        <label class="font-semibold">
                            Jenis Kelamin
                        </label>

                        <select
                            id="jk"
                            class="w-full mt-2 border rounded-lg p-3">

                            <option value="">Pilih</option>

                            <option>Laki-laki</option>

                            <option>Perempuan</option>

                        </select>

                    </div>

                    <div>

                        <label class="font-semibold">
                            Jenis Pelayanan
                        </label>

                        <select
                            id="layanan"
                            class="w-full mt-2 border rounded-lg p-3">

                            <option value="">Pilih</option>

                            <option>Administrasi Kependudukan</option>

                            <option>Surat Keterangan</option>

                            <option>Legalisasi</option>

                            <option>Informasi Publik</option>

                            <option>Pengaduan</option>

                            <option>Lainnya</option>

                        </select>

                    </div>

                </div>

                <h2 class="text-2xl font-bold text-red-800 mt-10 mb-6 border-b pb-3">
                    Penilaian Pelayanan
                </h2>
                                <!-- 1 -->
                <div class="mb-6">
                    <label class="block font-semibold mb-2">
                        1. Persyaratan Pelayanan
                    </label>

                    <select id="u1" class="w-full border rounded-lg p-3">
                        <option value="">Pilih Penilaian</option>
                        <option value="4">Sangat Baik</option>
                        <option value="3">Baik</option>
                        <option value="2">Cukup</option>
                        <option value="1">Kurang</option>
                    </select>
                </div>

                <!-- 2 -->
                <div class="mb-6">
                    <label class="block font-semibold mb-2">
                        2. Sistem, Mekanisme dan Prosedur
                    </label>

                    <select id="u2" class="w-full border rounded-lg p-3">
                        <option value="">Pilih Penilaian</option>
                        <option value="4">Sangat Baik</option>
                        <option value="3">Baik</option>
                        <option value="2">Cukup</option>
                        <option value="1">Kurang</option>
                    </select>
                </div>

                <!-- 3 -->
                <div class="mb-6">
                    <label class="block font-semibold mb-2">
                        3. Waktu Penyelesaian
                    </label>

                    <select id="u3" class="w-full border rounded-lg p-3">
                        <option value="">Pilih Penilaian</option>
                        <option value="4">Sangat Baik</option>
                        <option value="3">Baik</option>
                        <option value="2">Cukup</option>
                        <option value="1">Kurang</option>
                    </select>
                </div>

                <!-- 4 -->
                <div class="mb-6">
                    <label class="block font-semibold mb-2">
                        4. Biaya / Tarif
                    </label>

                    <select id="u4" class="w-full border rounded-lg p-3">
                        <option value="">Pilih Penilaian</option>
                        <option value="4">Sangat Baik</option>
                        <option value="3">Baik</option>
                        <option value="2">Cukup</option>
                        <option value="1">Kurang</option>
                    </select>
                </div>

                <!-- 5 -->
                <div class="mb-6">
                    <label class="block font-semibold mb-2">
                        5. Produk Pelayanan
                    </label>

                    <select id="u5" class="w-full border rounded-lg p-3">
                        <option value="">Pilih Penilaian</option>
                        <option value="4">Sangat Baik</option>
                        <option value="3">Baik</option>
                        <option value="2">Cukup</option>
                        <option value="1">Kurang</option>
                    </select>
                </div>

                <!-- 6 -->
                <div class="mb-6">
                    <label class="block font-semibold mb-2">
                        6. Kompetensi Pelaksana
                    </label>

                    <select id="u6" class="w-full border rounded-lg p-3">
                        <option value="">Pilih Penilaian</option>
                        <option value="4">Sangat Baik</option>
                        <option value="3">Baik</option>
                        <option value="2">Cukup</option>
                        <option value="1">Kurang</option>
                    </select>
                </div>

                <!-- 7 -->
                <div class="mb-6">
                    <label class="block font-semibold mb-2">
                        7. Perilaku Pelaksana
                    </label>

                    <select id="u7" class="w-full border rounded-lg p-3">
                        <option value="">Pilih Penilaian</option>
                        <option value="4">Sangat Baik</option>
                        <option value="3">Baik</option>
                        <option value="2">Cukup</option>
                        <option value="1">Kurang</option>
                    </select>
                </div>

                <!-- 8 -->
                <div class="mb-6">
                    <label class="block font-semibold mb-2">
                        8. Sarana dan Prasarana
                    </label>

                    <select id="u8" class="w-full border rounded-lg p-3">
                        <option value="">Pilih Penilaian</option>
                        <option value="4">Sangat Baik</option>
                        <option value="3">Baik</option>
                        <option value="2">Cukup</option>
                        <option value="1">Kurang</option>
                    </select>
                </div>

                <!-- 9 -->
                <div class="mb-8">
                    <label class="block font-semibold mb-2">
                        9. Penanganan Pengaduan, Saran dan Masukan
                    </label>

                    <select id="u9" class="w-full border rounded-lg p-3">
                        <option value="">Pilih Penilaian</option>
                        <option value="4">Sangat Baik</option>
                        <option value="3">Baik</option>
                        <option value="2">Cukup</option>
                        <option value="1">Kurang</option>
                    </select>
                </div>

                <h2 class="text-2xl font-bold text-red-800 mt-10 mb-5 border-b pb-3">
                    Kritik dan Saran
                </h2>

                <textarea
                    id="saran"
                    rows="6"
                    placeholder="Tuliskan kritik atau saran Anda di sini..."
                    class="w-full border rounded-lg p-4"></textarea>

                <div class="text-center mt-10">

                   <button
    id="btnKirim"
    type="submit"
    class="bg-red-800 hover:bg-red-900 text-white px-10 py-4 rounded-lg font-bold text-lg transition">

    <i class="fas fa-paper-plane mr-2"></i>

    Kirim Survei

</button>

   </div>

</form>

</div>

</main>

<!-- Footer -->
<div id="footer-placeholder"></div>

<script src="assets/js/main.js"></script>
<script src="assets/js/survei.js"></script>

</body>
</html>
