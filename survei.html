<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survei Kepuasan Masyarakat | Kecamatan Makale</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS Kustom Anda -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-gray-100 flex flex-col min-h-screen">

    <!-- Header Website (Dinonaktifkan pencariannya untuk perlindungan privasi data riwayat web) -->
    <div id="header-placeholder"></div>

    <!-- HERO SECTION -->
    <section class="relative bg-cover bg-center h-72" style="background-image:url('assets/images/Plaza Kolam Makale.jpg')">
        <div class="absolute inset-0 bg-black/60"></div>
        <div class="relative z-10 flex flex-col justify-center items-center h-full text-center text-white px-4">
            <h1 class="text-4xl font-extrabold tracking-wide">
                SURVEI KEPUASAN MASYARAKAT
            </h1>
            <p class="mt-3 max-w-2xl text-gray-200">
                Pendapat Anda sangat berarti bagi kami untuk meningkatkan kualitas pelayanan publik di Kecamatan Makale.
            </p>
        </div>
    </section>

    <!-- MAIN FORM CONTAINER -->
    <main class="max-w-5xl mx-auto w-full px-4 py-10 flex-grow">
        <div class="bg-white rounded-xl shadow-lg p-8">

            <!-- NOTIFIKASI DINAMIS (Warna diatur via JavaScript: Merah = Peringatan, Hijau = Sukses) -->
            <div id="notif" class="hidden mb-6 rounded-lg border p-4 shadow transition-all duration-300">
                <div class="flex items-center">
                    <i id="notifIcon" class="text-2xl mr-3"></i>
                    <div>
                        <h3 id="notifTitle" class="font-bold text-lg"></h3>
                        <p id="notifText" class="mt-0.5 text-sm md:text-base"></p>
                    </div>
                </div>
            </div>

            <form id="formSKM" novalidate>
                
                <!-- BAGIAN 1: IDENTITAS RESPONDEN -->
                <h2 class="text-2xl font-bold text-red-800 mb-6 border-b pb-3">
                    Identitas Responden
                </h2>

                <div class="grid md:grid-cols-2 gap-5">
                    <div>
                        <label for="nama" class="font-semibold">Nama (Opsional)</label>
                        <input type="text" id="nama" placeholder="Masukkan nama Anda (boleh dikosongkan)" class="w-full mt-2 border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-red-800">
                    </div>

                    <div>
                        <label for="umur" class="font-semibold">Umur <span class="text-red-600">*</span></label>
                        <input type="number" id="umur" placeholder="Contoh: 25" class="w-full mt-2 border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-red-800">
                    </div>

                    <div>
                        <label for="jk" class="font-semibold">Jenis Kelamin <span class="text-red-600">*</span></label>
                        <select id="jk" class="w-full mt-2 border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-red-800">
                            <option value="">Pilih</option>
                            <option value="Laki-laki">Laki-laki</option>
                            <option value="Perempuan">Perempuan</option>
                        </select>
                    </div>

                    <div>
                        <label for="layanan" class="font-semibold">Jenis Pelayanan Yang Diterima <span class="text-red-600">*</span></label>
                        <select id="layanan" class="w-full mt-2 border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-red-800">
                            <option value="">Pilih</option>
                            <option value="Administrasi Kependudukan">Administrasi Kependudukan</option>
                            <option value="Surat Keterangan">Surat Keterangan</option>
                            <option value="Legalisasi">Legalisasi</option>
                            <option value="Informasi Publik">Informasi Publik</option>
                            <option value="Pengaduan">Pengaduan</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>
                </div>

                <!-- BAGIAN 2: PENILAIAN 9 UNSUR PELAYANAN -->
                <h2 class="text-2xl font-bold text-red-800 mt-10 mb-6 border-b pb-3">
                    Penilaian Pelayanan <span class="text-red-500 text-sm font-normal">(Wajib Diisi Semua)</span>
                </h2>

                <!-- U1 -->
                <div class="mb-6">
                    <label for="u1" class="block font-semibold mb-2">1. Persyaratan Pelayanan</label>
                    <select id="u1" class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-red-800">
                        <option value="">Pilih Penilaian</option>
                        <option value="4">Sangat Baik</option>
                        <option value="3">Baik</option>
                        <option value="2">Cukup</option>
                        <option value="1">Kurang</option>
                    </select>
                </div>

                <!-- U2 -->
                <div class="mb-6">
                    <label for="u2" class="block font-semibold mb-2">2. Sistem, Mekanisme dan Prosedur</label>
                    <select id="u2" class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-red-800">
                        <option value="">Pilih Penilaian</option>
                        <option value="4">Sangat Baik</option>
                        <option value="3">Baik</option>
                        <option value="2">Cukup</option>
                        <option value="1">Kurang</option>
                    </select>
                </div>

                <!-- U3 -->
                <div class="mb-6">
                    <label for="u3" class="block font-semibold mb-2">3. Waktu Penyelesaian</label>
                    <select id="u3" class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-red-800">
                        <option value="">Pilih Penilaian</option>
                        <option value="4">Sangat Baik</option>
                        <option value="3">Baik</option>
                        <option value="2">Cukup</option>
                        <option value="1">Kurang</option>
                    </select>
                </div>

                <!-- U4 -->
                <div class="mb-6">
                    <label for="u4" class="block font-semibold mb-2">4. Biaya / Tarif</label>
                    <select id="u4" class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-red-800">
                        <option value="">Pilih Penilaian</option>
                        <option value="4">Sangat Baik</option>
                        <option value="3">Baik</option>
                        <option value="2">Cukup</option>
                        <option value="1">Kurang</option>
                    </select>
                </div>

                <!-- U5 -->
                <div class="mb-6">
                    <label for="u5" class="block font-semibold mb-2">5. Produk Pelayanan</label>
                    <select id="u5" class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-red-800">
                        <option value="">Pilih Penilaian</option>
                        <option value="4">Sangat Baik</option>
                        <option value="3">Baik</option>
                        <option value="2">Cukup</option>
                        <option value="1">Kurang</option>
                    </select>
                </div>

                <!-- U6 -->
                <div class="mb-6">
                    <label for="u6" class="block font-semibold mb-2">6. Kompetensi Pelaksana</label>
                    <select id="u6" class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-red-800">
                        <option value="">Pilih Penilaian</option>
                        <option value="4">Sangat Baik</option>
                        <option value="3">Baik</option>
                        <option value="2">Cukup</option>
                        <option value="1">Kurang</option>
                    </select>
                </div>

                <!-- U7 -->
                <div class="mb-6">
                    <label for="u7" class="block font-semibold mb-2">7. Perilaku Pelaksana</label>
                    <select id="u7" class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-red-800">
                        <option value="">Pilih Penilaian</option>
                        <option value="4">Sangat Baik</option>
                        <option value="3">Baik</option>
                        <option value="2">Cukup</option>
                        <option value="1">Kurang</option>
                    </select>
                </div>

                <!-- U8 -->
                <div class="mb-6">
                    <label for="u8" class="block font-semibold mb-2">8. Sarana dan Prasarana</label>
                    <select id="u8" class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-red-800">
                        <option value="">Pilih Penilaian</option>
                        <option value="4">Sangat Baik</option>
                        <option value="3">Baik</option>
                        <option value="2">Cukup</option>
                        <option value="1">Kurang</option>
                    </select>
                </div>

                <!-- U9 -->
                <div class="mb-8">
                    <label for="u9" class="block font-semibold mb-2">9. Penanganan Pengaduan, Saran dan Masukan</label>
                    <select id="u9" class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-red-800">
                        <option value="">Pilih Penilaian</option>
                        <option value="4">Sangat Baik</option>
                        <option value="3">Baik</option>
                        <option value="2">Cukup</option>
                        <option value="1">Kurang</option>
                    </select>
                </div>

                <!-- BAGIAN 3: KRITIK DAN SARAN -->
                <h2 class="text-2xl font-bold text-red-800 mt-10 mb-5 border-b pb-3">
                    Kritik dan Saran
                </h2>
                <textarea id="saran" rows="6" placeholder="Tuliskan kritik atau saran konstruktif Anda di sini..." class="w-full border rounded-lg p-4 focus:outline-none focus:ring-2 focus:ring-red-800"></textarea>

                <!-- TOMBOL SUBMIT -->
                <div class="text-center mt-10">
                    <button id="btnKirim" type="submit" class="bg-red-800 hover:bg-red-900 text-white px-12 py-4 rounded-lg font-bold text-lg shadow-md transition duration-200">
                        <i class="fas fa-paper-plane mr-2"></i> Kirim Survei
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer Website -->
    <div id="footer-placeholder"></div>

    <!-- Pemuatan JavaScript External -->
    <script src="assets/js/main.js"></script>
    <script src="assets/js/survei.js"></script>
</body>
</html>
