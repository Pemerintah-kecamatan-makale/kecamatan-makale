<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabar Makale | Website Resmi Kecamatan Makale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <div id="header-placeholder"></div>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-12 w-full">
        
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-10 border-b border-gray-200 pb-6">
            <div>
                <h1 class="text-3xl font-black text-gray-900 tracking-tight">Kabar Makale</h1>
                <p class="text-sm text-gray-500 mt-1">Informasi terpercaya seputar regulasi, pembangunan, dan pengumuman kecamatan.</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-12 text-gray-500">
                <i class="fas fa-spinner fa-spin text-2xl mb-2 text-amber-800"></i>
                <p>Memuat kabar terbaru dari Kecamatan Makale...</p>
            </div>
        </div>

    </main>

    <div id="newsModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 transition-all duration-300">
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[85vh] overflow-y-auto shadow-xl transform scale-95 transition-transform duration-300 flex flex-col">
            <div class="p-5 border-b border-gray-100 flex justify-between items-start sticky top-0 bg-white z-10">
                <div class="pr-6">
                    <span id="modalBadge" class="text-white font-bold text-[10px] uppercase tracking-wider px-2.5 py-0.5 rounded-full"></span>
                    <h2 id="modalTitle" class="text-xl font-bold text-gray-900 mt-2"></h2>
                    <p id="modalDate" class="text-xs text-gray-400 mt-1"></p>
                </div>
                <button onclick="closeNewsModal()" class="text-gray-500 hover:text-gray-800 hover:bg-gray-100 p-2.5 rounded-xl border border-gray-200/60 transition-all duration-200 flex items-center justify-center shrink-0 min-w-[40px] h-[40px]" title="Tutup">
                    <span class="font-bold text-base">✕</span>
                </button>
            </div>
            <div class="p-6 overflow-y-auto">
                <img id="modalImage" class="w-full h-64 object-cover rounded-xl shadow-sm mb-5" src="" alt="" />
                <div id="modalBody" class="text-gray-700 text-sm leading-relaxed space-y-4 text-justify"></div>
            </div>
        </div>
    </div>

  <script>
        // ID Spreadsheet Terintegrasi dari Link Anda
        const SPREADSHEET_ID = '1lhslwSr1kKfvU19cwQ3CPNvDf0X-0xGTPuiLmxzX6zs'; 
        const jsonUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;
        
        let globalNewsData = {};

        async function loadNewsFromForm() {
            try {
                const response = await fetch(jsonUrl);
                const text = await response.text();
                const jsonData = JSON.parse(text.substring(47, text.length - 2));
                const rows = jsonData.table.rows;
                
                const gridContainer = document.querySelector('.grid');
                gridContainer.innerHTML = ''; // Bersihkan loading text

                // Membalikkan baris agar berita paling baru di HP muncul paling atas di web
                rows.reverse().forEach((row, index) => {
                    // DISESUAIKAN DENGAN IMAGE_85B95E.PNG:
                    const judulBerita = row.c[1]?.v || ''; // Kolom B: Judul
                    const rawFotoUrl = row.c[2]?.v || '';  // Kolom C: Upload Foto
                    const isiBerita = row.c[3]?.v || '';   // Kolom D: Isi Berita
                    const timestamp = row.c[0]?.f || '';
                    const tanggal = timestamp.split(' ')[0]; // Mengambil komponen tanggal saja

                    if (!judulBerita || !isiBerita) return; 

                    // KONVERSI LINK GOOGLE DRIVE AGAR TEMBUS LANGSUNG SEBAGAI GAMBAR WEB
                    let fotoFinal = "Plaza Kolam Makale.jpg"; // Gambar cadangan jika eror
                    if (rawFotoUrl.includes('id=')) {
                        const fileId = rawFotoUrl.split('id=')[1].split('&')[0];
                        fotoFinal = `https://drive.google.com/uc?export=view&id=${fileId}`;
                    } else if (rawFotoUrl.includes('file/d/')) {
                        const fileId = rawFotoUrl.split('file/d/')[1].split('/')[0];
                        fotoFinal = `https://drive.google.com/uc?export=view&id=${fileId}`;
                    } else if (rawFotoUrl.startsWith('http')) {
                        fotoFinal = rawFotoUrl;
                    }

                    const newsId = `berita_${index}`;
                    const ringkasanTeks = isiBerita.length > 120 ? isiBerita.substring(0, 120) + "..." : isiBerita;

                    // Daftarkan data lengkap untuk pop-up modal
                    globalNewsData[newsId] = {
                        title: judulBerita,
                        date: tanggal,
                        badge: "Kabar Makale",
                        badgeColor: "bg-amber-700",
                        image: fotoFinal,
                        content: isiBerita.replace(/\n/g, '<br>') // Mengubah Enter ketikan HP menjadi paragraf HTML
                    };

                    // Cetak Kartu Berita ke Layout
                    const cardHtml = `
                        <article class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-all duration-300 flex flex-col justify-between group">
                            <div>
                                <div class="relative overflow-hidden h-52 bg-gray-100">
                                    <img class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" src="${fotoFinal}" alt="${judulBerita}" onerror="this.src='Plaza Kolam Makale.jpg';" />
                                    <span class="absolute top-4 left-4 bg-amber-700 text-white font-semibold text-xs px-3 py-1 rounded-full shadow-sm">Kabar Makale</span>
                                </div>
                                <div class="p-5">
                                    <div class="text-xs text-gray-400 mb-2"><i class="far fa-calendar-alt mr-1"></i> ${tanggal}</div>
                                    <h3 class="font-bold text-gray-900 line-clamp-2 group-hover:text-amber-800 transition duration-200 text-base mb-3 min-h-[48px]">
                                        ${judulBerita}
                                    </h3>
                                    <p class="text-gray-600 text-sm line-clamp-3 text-justify">
                                        ${ringkasanTeks}
                                    </p>
                                </div>
                            </div>
                            <div class="px-5 pb-5 pt-2">
                                <button onclick="openNewsModal('${newsId}')" class="w-full text-center bg-stone-50 hover:bg-amber-800 hover:text-white text-amber-900 font-medium text-sm py-2.5 px-4 rounded-xl border border-stone-200/60 transition-all duration-200">
                                    Baca Selengkapnya
                                </button>
                            </div>
                        </article>
                    `;
                    gridContainer.innerHTML += cardHtml;
                });
            }

            // Pengendali Modal Pop-Up
            function openNewsModal(key) {
                const data = globalNewsData[key];
                if (!data) return;

                document.getElementById('modalTitle').innerText = data.title;
                document.getElementById('modalDate').innerHTML = `<i class="far fa-calendar-alt mr-1"></i> Ditulis pada: ` + data.date;
                document.getElementById('modalBadge').innerText = data.badge;
                document.getElementById('modalBadge').className = `text-white font-bold text-[10px] uppercase tracking-wider px-2.5 py-0.5 rounded-full ` + data.badgeColor;
                document.getElementById('modalImage').src = data.image;
                document.getElementById('modalImage').onerror = function() { this.src = 'Plaza Kolam Makale.jpg'; };
                document.getElementById('modalBody').innerHTML = data.content;

                const modal = document.getElementById('newsModal');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                document.body.style.overflow = 'hidden';
            }

            function closeNewsModal() {
                const modal = document.getElementById('newsModal');
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                document.body.style.overflow = 'auto';
            }

            window.onclick = function(event) {
                const modal = document.getElementById('newsModal');
                if (event.target == modal) { closeNewsModal(); }
            }

            document.addEventListener("DOMContentLoaded", loadNewsFromForm);
    </script>
</body>
</html>
