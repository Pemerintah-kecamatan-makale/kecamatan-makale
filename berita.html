<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Berita Kecamatan Makale
</title>


<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>


<!-- Font Awesome -->
<link 
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
/>


<style>

.line-clamp-2{

display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;

}


body{

font-family:
"Inter",
Arial,
sans-serif;

}


</style>


</head>



<body class="bg-gray-100">


<!-- ================= HEADER ================= -->

<header class="bg-amber-700 text-white shadow-lg">


<div class="max-w-7xl mx-auto px-5 py-6">


<h1 class="text-3xl md:text-4xl font-bold">

Berita Kecamatan Makale

</h1>


<p class="mt-2 text-amber-100">

Informasi terbaru dan kegiatan Kecamatan Makale

</p>


</div>


</header>




<!-- ================= CONTENT ================= -->

<main class="max-w-7xl mx-auto px-5 py-10">



<!-- FILTER -->

<section class="bg-white rounded-2xl shadow p-6 mb-8">


<div class="grid md:grid-cols-2 gap-5">



<!-- SEARCH -->

<div>

<label class="block font-semibold text-gray-700 mb-2">

Cari Berita

</label>


<div class="relative">


<i class="fas fa-search absolute left-4 top-4 text-gray-400"></i>


<input

id="search-news"

type="text"

placeholder="Ketik kata kunci berita..."

class="w-full border rounded-xl py-3 pl-12 pr-4 focus:ring-2 focus:ring-amber-600 outline-none"

/>


</div>


</div>





<!-- CATEGORY -->

<div>


<label class="block font-semibold text-gray-700 mb-2">

Kategori

</label>


<select

id="category-filter"

class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-amber-600 outline-none"


>

<option value="">

Semua Kategori

</option>


</select>


</div>


</div>


</section>





<!-- ================= NEWS GRID ================= -->

<section>


<div

id="news-container"

class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"

>


<!-- DATA BERITA MASUK DARI berita.js -->


</div>



</section>






<!-- PAGINATION -->

<div

id="pagination"

class="mt-8"

>

</div>




</main>





<!-- ================= FOOTER ================= -->

<footer class="bg-gray-900 text-white mt-10">


<div class="max-w-7xl mx-auto px-5 py-8 text-center">


<p>

© Kecamatan Makale

</p>


<p class="text-gray-400 text-sm mt-2">

Website Resmi Kecamatan Makale

</p>


</div>


</footer>







<!-- BACK TO TOP -->

<button

id="backToTop"

class="hidden fixed bottom-6 right-6 bg-amber-700 text-white w-12 h-12 rounded-full shadow-xl hover:bg-amber-800"


title="Kembali ke atas"


>

<i class="fas fa-arrow-up"></i>


</button>






<!-- SCRIPT BERITA -->

<script src="assets/js/berita.js"></script>



</body>

</html>
