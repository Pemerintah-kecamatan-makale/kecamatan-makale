<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berita | Website Resmi Kecamatan Makale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <div id="header-placeholder" class="w-full"></div>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-12 w-full">
        <h1 class="text-3xl font-black text-gray-900 mb-10">Kabar Makale</h1>
        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div id="loading-state" class="col-span-full text-center py-16 text-gray-400">
                <i class="fas fa-circle-notch fa-spin text-3xl mb-3 text-amber-800"></i>
                <p>Memuat kabar terbaru...</p>
            </div>
        </div>
    </main>

    <script>
        const SPREADSHEET_ID = '1Y2qLpJf_82-5i5EOfQYnfD_tV-oNJtc217pvNeyBJaQ'; 
        const jsonUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&tq=select%20*`;
        
        async function fetchLiveNewsData() {
            const gridContainer = document.getElementById('news-grid');
            try {
                const response = await fetch(jsonUrl);
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;

                console.log("Data diterima, jumlah baris:", rows.length);
                gridContainer.innerHTML = ''; 

                // .slice(1) membuang baris header, .reverse() membalik urutan
                const processedRows = [...rows].slice(1).reverse();

                processedRows.forEach((row, index) => {
                    if (!row.c[1]) return; // Lewati jika judul kosong

                    const judul = row.c[1]?.v || "Tanpa Judul";
                    const isi = row.c[2]?.v || "Tidak ada isi.";
                    const tgl = row.c[5]?.f || row.c[5]?.v || "Baru saja";

                    const card = document.createElement('article');
                    card.className = "bg-white p-6 rounded-2xl shadow-sm border border-gray-100";
                    card.innerHTML = `
                        <h3 class="font-bold text-lg mb-2">${judul}</h3>
                        <p class="text-sm text-gray-500 mb-4">${tgl}</p>
                        <p class="text-gray-700 text-sm line-clamp-3">${isi}</p>
                    `;
                    gridContainer.appendChild(card);
                });
            } catch (err) {
                console.error("Error Detail:", err);
                gridContainer.innerHTML = `<p class="col-span-full text-center text-red-500">Gagal memuat. Periksa Konsol (F12).</p>`;
            }
        }

        document.addEventListener("DOMContentLoaded", fetchLiveNewsData);
    </script>
</body>
</html>
