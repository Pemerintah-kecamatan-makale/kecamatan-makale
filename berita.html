<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Berita | Website Resmi Kecamatan Makale</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/berita.css">

</head>

<body class="bg-gray-50 flex flex-col min-h-screen">

    <!-- HEADER -->
    <div id="header-placeholder"></div>

    <!-- KONTEN -->
    <main class="flex-grow max-w-7xl mx-auto px-4 py-12 w-full">

        <div
            class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-10 border-b border-gray-200 pb-6">

            <div>

                <h1 class="text-3xl font-black text-gray-900 tracking-tight">
                    Kabar Makale
                </h1>

                <p class="text-sm text-gray-500 mt-1">
                    Informasi Resmi Pemerintah Kecamatan Makale
                </p>

            </div>

            <div class="relative w-full md:w-72">

                <input
                    id="news-search"
                    type="text"
                    placeholder="Cari berita..."
                    onkeyup="filterNews()"
                    class="w-full text-sm pl-10 pr-4 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-amber-700 focus:outline-none">

                <i class="fas fa-search absolute left-3 top-3.5 text-gray-400"></i>

            </div>

        </div>


        <!-- GRID BERITA -->

        <div
            id="news-grid"
            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

            <div
                id="loading-state"
                class="col-span-full text-center py-20">

                <i class="fas fa-spinner fa-spin text-4xl text-amber-700"></i>

                <p class="mt-5 text-gray-500">

                    Memuat berita terbaru...

                </p>

            </div>

        </div>

    </main>

    <!-- FOOTER -->
    <div id="footer-placeholder"></div>

    <!-- MAIN WEBSITE -->
    <script src="assets/js/main.js"></script>

    <!-- BERITA -->
    <script src="assets/js/berita.js"></script>

</body>

</html>
