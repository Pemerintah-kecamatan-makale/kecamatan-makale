<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berita | Website Resmi Kecamatan Makale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <div id="header-placeholder" class="w-full"></div>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-12 w-full">
        
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-10 border-b border-gray-200 pb-6">
            <div>
                <h1 class="text-3xl font-black text-gray-900 tracking-tight">Kabar Makale</h1>
                <p class="text-sm text-gray-500 mt-1">Informasi terpercaya seputar regulasi, pembangunan, dan pengumuman kecamatan.</p>
            </div>
            
            <div class="relative w-full md:w-72 self-start md:self-auto">
                <input type="text" id="news-search" oninput="filterNews()" placeholder="Cari berita..." class="w-full text-xs pl-9 pr-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-amber-800/20 focus:border-amber-800 bg-white shadow-sm transition-all duration-200">
                <i class="fas fa-search absolute left-3 top-3.5 text-gray-400 text-xs"></i>
            </div>
        </div>

        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div id="loading-state" class="col-span-full text-center py-16 text-gray-400">
                <i class="fas fa-circle-notch fa-spin text-3xl mb-3 text-amber-800"></i>
                <p class="text-sm font-medium">Memuat kabar terbaru dari Kecamatan Makale...</p>
            </div>
        </div>

    </main>

    <div id="newsModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4 transition-all duration-300">
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[85vh] overflow-y-auto shadow-xl transform scale-95 transition-transform duration-300 flex flex-col">
            <div class="p-5 border-b border-gray-100 flex justify-between items-start sticky top-0 bg-white z-10">
                <div class="pr-6">
                    <span id="modalBadge" class="text-white font-bold text-[10px] uppercase tracking-wider px-2.5 py-0.5 rounded-full bg-amber-700">Kabar Makale</span>
                    <h2 id="modalTitle" class="text-xl font-bold text-gray-900 mt-2 leading-snug"></h2>
                    <p id="modalDate" class="text-xs text-gray-400 mt-1.5"></p>
                </div>
                <button onclick="closeNewsModal()" class="text-gray-400 hover:text-gray-700 hover:bg-gray-100 p-2 rounded-xl transition-all duration-200 flex items-center justify-center h-9 w-9 border border-gray-100 shrink-0">
                    <span class="font-bold text-base">✕</span>
                </button>
            </div>
            <div class="p-6 overflow-y-auto">
                <img id="modalImage" class="w-full h-64 object-cover rounded-xl shadow-sm mb-5 bg-stone-100" src="" alt="" />
                <div id="modalBody" class="text-gray-700 text-sm leading-relaxed space-y-4 text-justify whitespace-pre-line"></div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder" class="w-full"></div>

    <script>
        function loadComponents() {
            fetch('assets/components/header.html')
                .then(response => {
                    if (!response.ok) return fetch('/assets/components/header.html');
                    return response;
                })
                .then(response => response.text())
                .then(data => {
                    document.getElementById('header-placeholder').innerHTML = data;
                })
                .catch(err => console.error("Gagal memuat komponen header:", err));

            fetch('assets/components/footer.html')
                .then(response => {
                    if (!response.ok) return fetch('/assets/components/footer.html');
                    return response;
                })
                .then(response => response.text())
                .then(data => {
                    document.getElementById('footer-placeholder').innerHTML = data;
                })
                .catch(err => console.error("Gagal memuat komponen footer:", err));
        }

        const SPREADSHEET_ID = '1Y2qLpJf_82-5i5EOfQYnfD_tV-oNJtc217pvNeyBJaQ'; 
        const jsonUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;
        
        let globalNewsData = {};

        function extractDriveId(url) {
            if (!url) return null;
            
            if (url.includes('/d/')) {
                const parts = url.split('/d/');
                if (parts[1]) return parts[1].split('/')[0];
            }
            
            const match = url.match(/[?&]id=([^&#]+)/);
            if (match && match[1]) return match[1];
            
            const fallbackMatch = url.match(/(?:id=|\/d\/)([a-zA-Z0-9-_]{25,40})/);
            return fallbackMatch ? fallbackMatch[1] : null;
        }

        async function fetchLiveNewsData() {
            const gridContainer = document.getElementById('news-grid');
            try {
                const response = await fetch(jsonUrl);
                const text = await response.text();
                
                const startIdx = text.indexOf('{');
                const endIdx = text.lastIndexOf('}');
                
                if (startIdx === -1 || endIdx === -1) throw new Error("Format data tidak valid.");
                
                const jsonRaw = text.substring(startIdx, endIdx + 1);
                const jsonData = JSON.parse(jsonRaw);
                const rows = jsonData.table.rows;
                
                gridContainer.innerHTML = ''; 

                let reverseRows = [...rows].reverse();
                let dataCount = 0;

                reverseRows.forEach((row, index) => {
                    if (!row || !row.c) return;

                    const judulBerita = row.c[1]?.v || ''; 
                    const isiBerita = row.c[2]?.v || '';   
                    const rawFotoUrl = row.c[3]?.v || '';  
                    
                    const tanggalManual = row.c[5] ? (row.c[5].f || row.c[5].v || '') : '';
                    const timestampBawaan = row.c[0] ? (row.c[0].f || row.c[0].v || '') : '';
                    const tanggalCadangan = timestampBawaan ? timestampBawaan.split(' ')[0] : 'Baru Saja';
                    const tanggal = tanggalManual.trim() ? tanggalManual.trim() : tanggalCadangan;

                    if (!judulBerita || !isiBerita || judulBerita === "Judul") return;
                    dataCount++;

                    let fotoFinal = "Plaza Kolam Makale.jpg"; 
                    const driveId = extractDriveId(rawFotoUrl);
                    
                    if (driveId) {
                        // MENGGUNAKAN THUMBNAIL ENGINE (Paling Stabil untuk GitHub Pages & Anti-Blokir)
                        fotoFinal = `https://drive.google.com/thumbnail?sz=w800&id=${driveId}`;
                    } else if (rawFotoUrl && rawFotoUrl.startsWith('http')) {
                        fotoFinal = rawFotoUrl;
                    }

                    const newsId = `berita_id_${index}`;
                    const cuplikanTeks = isiBerita.length > 115 ? isiBerita.substring(0, 115) + "..." : isiBerita;

                    globalNewsData[newsId] = {
                        title: judulBerita,
                        date: tanggal,
                        image: fotoFinal,
                        content: isiBerita
                    };

                   const cardTemplate = `
    <article data-title="${judulBerita.toLowerCase()}" class="news-card bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-all duration-300 flex flex-col justify-between group">
        <div>
            <div class="px-5 pt-5 pb-1">
                <span class="inline-block bg-amber-700 text-white font-semibold text-[11px] px-3 py-1 rounded-full shadow-sm">Kabar Makale</span>
            </div>

            <div class="relative overflow-hidden h-52 bg-stone-100 mx-5 rounded-xl">
                <img class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" src="${fotoFinal}" alt="${judulBerita}" onerror="this.src='Plaza Kolam Makale.jpg';" />
            </div>

            <div class="p-5">
                <div class="text-[11px] font-medium text-gray-400 mb-2 flex items-center gap-1.5">
                    <i class="far fa-calendar-alt"></i> ${tanggal}
                </div>
                <h3 class="font-bold text-gray-900 line-clamp-2 group-hover:text-amber-800 transition duration-200 text-base mb-2.5 min-h-[48px] leading-snug">
                    ${judulBerita}
                </h3>
                <p class="text-gray-600 text-xs leading-relaxed line-clamp-3 text-justify">
                    ${cuplikanTeks}
                </p>
            </div>
        </div>
        <div class="px-5 pb-5 pt-2">
            <button onclick="openNewsModal('${newsId}')" class="w-full text-center bg-stone-50 hover:bg-amber-800 hover:text-white text-amber-900 font-semibold text-xs py-2.5 px-4 rounded-xl border border-stone-200/70 transition-all duration-200 shadow-sm">
                Baca Selengkapnya
            </button>
        </div>
    </article>

                    `;
                    gridContainer.innerHTML += cardTemplate;
                });

                if (dataCount === 0) {
                    gridContainer.innerHTML = `
                        <div class="col-span-full text-center py-16 text-gray-400 border-2 border-dashed border-stone-200 rounded-2xl bg-white">
                            <i class="far fa-newspaper text-3xl mb-3 text-gray-300"></i>
                            <p class="text-sm font-medium">Belum ada data berita yang masuk di spreadsheet.</p>
                        </div>`;
                }

            } catch (err) {
                console.error("Gagal menarik data: ", err);
                gridContainer.innerHTML = `<div class="col-span-full text-center py-16 text-red-500">Gagal memuat berita secara real-time.</div>`;
            }
        }

        function filterNews() {
            const keyword = document.getElementById('news-search').value.toLowerCase();
            const cards = document.querySelectorAll('.news-card');
            cards.forEach(card => {
                const title = card.getAttribute('data-title');
                card.classList.toggle('hidden', !title.includes(keyword));
            });
        }

        function openNewsModal(key) {
            const data = globalNewsData[key];
            if (!data) return;

            document.getElementById('modalTitle').innerText = data.title;
            document.getElementById('modalDate').innerHTML = `<i class="far fa-calendar-alt mr-1"></i> Publikasi Resmi: ` + data.date;
            document.getElementById('modalImage').src = data.image;
            document.getElementById('modalImage').onerror = function() { this.src = 'Plaza Kolam Makale.jpg'; };
            document.getElementById('modalBody').innerText = data.content;

            const modal = document.getElementById('newsModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden'; 
        }

        function closeNewsModal() {
            const modal = document.getElementById('newsModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = 'auto'; 
        }

        window.onclick = function(event) {
            const modal = document.getElementById('newsModal');
            if (event.target == modal) { closeNewsModal(); }
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadComponents();      
            fetchLiveNewsData();   
        });
    </script>
</body>
</html>
