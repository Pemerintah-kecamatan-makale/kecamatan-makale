<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Berita Kecamatan Makale
</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>


<!-- Font Awesome -->
<link 
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
/>


<style>

.line-clamp-2{

display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;

}


body{

font-family:
"Inter",
Arial,
sans-serif;

}


</style>

 <link rel="stylesheet" href="assets/css/style.css">
</head>




<body class="bg-gray-50 flex flex-col min-h-screen">
<div id="header-placeholder"></div>
<main class="flex-grow w-full">
<section class="bg-gradient-to-r from-amber-800 to-amber-700 text-white shadow">

    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center">

        <div>

            <span class="text-xs font-bold uppercase tracking-widest text-amber-200">
                Informasi Publik
            </span>

            <h1 class="text-2xl md:text-3xl font-bold mt-1">
                Berita Kecamatan Makale
            </h1>

            <p class="mt-1 text-amber-100">
                Informasi terbaru dan kegiatan Kecamatan Makale.
            </p>

        </div>

    </div>

</section>
<section class="max-w-7xl mx-auto px-5 py-10">
<!-- ================= CONTENT ================= -->

<main class="max-w-7xl mx-auto px-5 py-10">



<!-- FILTER -->

<section class="bg-white rounded-2xl shadow p-6 mb-8">

    <div class="flex justify-end">

        <div class="w-full md:w-96">

            <label class="block font-semibold text-gray-700 mb-2">
                Cari Berita
            </label>

            <div class="relative">

                <i class="fas fa-search absolute left-4 top-4 text-gray-400"></i>

                <input
                    id="search-news"
                    type="text"
                    placeholder="Ketik kata kunci berita..."
                    class="w-full border rounded-xl py-3 pl-12 pr-4 focus:ring-2 focus:ring-amber-600 outline-none">

            </div>

        </div>

    </div>

</section>





<!-- ================= NEWS GRID ================= -->

<section>


<div

id="news-container"

class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"

>


<!-- DATA BERITA MASUK DARI berita.js -->


</div>



</section>






<!-- PAGINATION -->

<div

id="pagination"

class="mt-8"

>

</div>

</section>
</main>
<div id="footer-placeholder"></div>

<!-- BACK TO TOP -->

<button

id="backToTop"

class="hidden fixed bottom-6 right-6 bg-amber-700 text-white w-12 h-12 rounded-full shadow-xl hover:bg-amber-800"


title="Kembali ke atas"


>

<i class="fas fa-arrow-up"></i>


</button>






<!-- SCRIPT BERITA -->

<script src="assets/js/main.js"></script>
<script src="assets/js/berita.js"></script>
</body>

</html>
