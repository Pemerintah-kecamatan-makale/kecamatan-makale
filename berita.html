<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Berita Kecamatan Makale
</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>


<!-- Font Awesome -->
<link 
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
/>


<style>

.line-clamp-2{

display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;

}


body{

font-family:
"Inter",
Arial,
sans-serif;

}


</style>

 <link rel="stylesheet" href="assets/css/style.css">
</head>




<body class="bg-gray-100">


<!-- ================= HEADER ================= -->

<header class="bg-amber-700 text-white shadow-lg">


<div class="max-w-7xl mx-auto px-5 py-6">


<h1 class="text-3xl md:text-4xl font-bold">

Berita Kecamatan Makale

</h1>


<p class="mt-2 text-amber-100">

Informasi terbaru dan kegiatan Kecamatan Makale

</p>


</div>


</header>




<!-- ================= CONTENT ================= -->

<main class="max-w-7xl mx-auto px-5 py-10">



<!-- FILTER -->

<section class="bg-white rounded-2xl shadow p-6 mb-8">


<div class="grid md:grid-cols-2 gap-5">



<!-- SEARCH -->

<div>

<label class="block font-semibold text-gray-700 mb-2">

Cari Berita

</label>


<div class="relative">


<i class="fas fa-search absolute left-4 top-4 text-gray-400"></i>


<input

id="search-news"

type="text"

placeholder="Ketik kata kunci berita..."

class="w-full border rounded-xl py-3 pl-12 pr-4 focus:ring-2 focus:ring-amber-600 outline-none"

/>


</div>


</div>





<!-- CATEGORY -->

<div>


<label class="block font-semibold text-gray-700 mb-2">

Kategori

</label>


<select

id="category-filter"

class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-amber-600 outline-none"


>

<option value="">

Semua Kategori

</option>


</select>


</div>


</div>


</section>





<!-- ================= NEWS GRID ================= -->

<section>


<div

id="news-container"

class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"

>


<!-- DATA BERITA MASUK DARI berita.js -->


</div>



</section>






<!-- PAGINATION -->

<div

id="pagination"

class="mt-8"

>

</div>

</main>

<!-- BACK TO TOP -->

<button

id="backToTop"

class="hidden fixed bottom-6 right-6 bg-amber-700 text-white w-12 h-12 rounded-full shadow-xl hover:bg-amber-800"


title="Kembali ke atas"


>

<i class="fas fa-arrow-up"></i>


</button>






<!-- SCRIPT BERITA -->

<script src="assets/js/berita.js"></script>

 <!-- REUSABLE FOOTER PLACEHOLDER -->
    <div id="footer-placeholder"></div>

    <script src="assets/js/main.js"></script>
    <script>
        // Logika Client-Side Filter Galeri
        function filterGallery(category) {
            const items = document.querySelectorAll('.gallery-item');
            const buttons = document.querySelectorAll('.gallery-filter-btn');
            
            // Setel ulang warna semua tombol filter
            buttons.forEach(btn => {
                btn.className = "gallery-filter-btn px-5 py-2 bg-white text-gray-700 hover:bg-gray-100 font-bold text-xs rounded-xl shadow-sm uppercase tracking-wider transition-all border border-gray-200";
            });

            // Warnai tombol yang sedang aktif
            event.target.className = "gallery-filter-btn px-5 py-2 bg-red-800 text-amber-300 font-bold text-xs rounded-xl shadow-sm uppercase tracking-wider transition-all";

            // Sembunyikan atau tampilkan item galeri sesuai kategori
            items.forEach(item => {
                if (category === 'semua' || item.getAttribute('data-category') === category) {
                    item.classList.remove('hidden');
                } else {
                    item.classList.add('hidden');
                }
            });
        }
    </script>

</body>

</html>
