<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Check Google Sheets Photo Column</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f5f5f5; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 900px; }
        h1 { color: #333; }
        pre { background: #f0f0f0; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f9f9f9; }
        .truncate { max-width: 400px; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Google Sheets Foto Column Checker</h1>
        <p>Mengambil data langsung dari Google Sheets untuk verify foto URLs...</p>
        
        <div id="output">
            <p class="info">Loading...</p>
        </div>
    </div>

    <script>
        async function checkPhotos() {
            const SPREADSHEET_ID = '1Y2qLpJf_82-5i5EOfQYnfD_tV-oNJtc217pvNeyBJaQ';
            const sheetUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;
            const output = document.getElementById('output');
            
            try {
                const response = await fetch(sheetUrl);
                const text = await response.text();
                const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}')+1));
                const rows = json.table.rows || [];
                
                let html = `<p class="success">✓ Berhasil mengambil ${rows.length} rows dari Google Sheets</p>`;
                html += `<table>
                    <tr>
                        <th>#</th>
                        <th>Judul (Col 1)</th>
                        <th>Foto URL (Col 3)</th>
                        <th>Status</th>
                        <th>Extracted Drive ID</th>
                    </tr>`;
                
                rows.forEach((row, idx) => {
                    if (!row || !row.c) return;
                    
                    const judul = row.c[1] ? row.c[1].v : '';
                    const foto = row.c[3] ? row.c[3].v : '';
                    
                    if (!judul) return;
                    
                    let driveId = null;
                    let status = '❌ No Drive ID found';
                    let fotoDisplay = foto || '(empty)';
                    
                    if (foto) {
                        // Try pattern 1: /d/XXXXX
                        let match = foto.match(/\/d\/([a-zA-Z0-9-_]{20,})/);
                        if (match && match[1]) {
                            driveId = match[1];
                            status = '✓ Drive ID extracted';
                        } else {
                            // Try pattern 2: id=XXXXX
                            match = foto.match(/[?&]id=([a-zA-Z0-9-_]{20,})/);
                            if (match && match[1]) {
                                driveId = match[1];
                                status = '✓ Drive ID extracted (id=)';
                            } else if (foto.startsWith('http')) {
                                status = '✓ Direct HTTP URL';
                                driveId = '(direct URL)';
                            }
                        }
                    }
                    
                    html += `<tr>
                        <td>${idx + 1}</td>
                        <td>${judul}</td>
                        <td class="truncate">${fotoDisplay}</td>
                        <td class="${status.includes('✓') ? 'success' : 'error'}">${status}</td>
                        <td>${driveId || '(none)'}</td>
                    </tr>`;
                });
                
                html += `</table>`;
                
                // Add diagnostic info
                html += `<hr><h2>Console Test Output</h2>`;
                html += `<p class="info">Cek browser console (F12 → Console) untuk detailed logs dari fetchBeritaBeranda function</p>`;
                html += `<p>Seharusnya ada logs seperti:</p>
                <pre>
Raw foto URL from sheet: [URL]
Using Google Drive thumbnail: https://drive.google.com/thumbnail?...
// ATAU
Using direct URL: [URL]
// ATAU
No foto URL from sheet, using default
                </pre>`;
                
                output.innerHTML = html;
            } catch (error) {
                output.innerHTML = `<p class="error">❌ Error: ${error.message}</p><pre>${error.stack}</pre>`;
            }
        }
        
        checkPhotos();
    </script>
</body>
</html>
